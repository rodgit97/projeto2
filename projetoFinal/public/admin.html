<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Xwitter</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="admin-panel">
      <h1>Painel de Administração</h1>
      <p>
        Aqui podes gerir os utilizadores, tweets e comentários da plataforma.
      </p>

      <div class="admin-section">
        <h2>Utilizadores</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Handle</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <!-- Utilizadores serão carregados aqui -->
          </tbody>
        </table>
      </div>

      <div class="admin-section">
        <h2>Tweets</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Autor</th>
              <th>Conteúdo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tweets-table-body">
            <!-- Tweets serão carregados aqui -->
          </tbody>
        </table>
      </div>

      <div class="admin-section">
        <h2>Comentários</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Autor</th>
              <th>Conteúdo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="comments-table-body">
            <!-- Comentários serão carregados aqui -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
      requireAuth();
      if (currentUser.role !== "admin") {
        alert(
          "Acesso negado. Apenas administradores podem aceder a esta página.",
        );
        window.location.href = "feed.html";
      }

      // Funções para carregar dados e gerir ações de admin
      async function loadAdminData() {
        await Promise.all([loadUsers(), loadTweets(), loadComments()]);
      }

      async function loadUsers() {
        const res = await apiFetch("/admin/users");
        if (!res || !res.ok) return;
        const users = await res.json();
        const tbody = $("users-table-body");
        tbody.innerHTML = users
          .map(
            (u) => `
          <tr>
            <td>${u.id}</td>
            <td>${u.username}</td>
            <td>@${u.username}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Eliminar</button></td>
          </tr>
        `,
          )
          .join("");
      }

      async function loadTweets() {
        const res = await apiFetch("/admin/tweets");
        if (!res || !res.ok) return;
        const tweets = await res.json();
        const tbody = $("tweets-table-body");
        tbody.innerHTML = tweets
          .map(
            (t) => `
          <tr>
            <td>${t.id}</td>
            <td>${t.User?.username || "desconecido"}</td>
            <td>${t.content}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteTweet(${t.id})">Eliminar</button></td>
          </tr>
        `,
          )
          .join("");
      }

      async function loadComments() {
        const res = await apiFetch("/admin/comments");
        if (!res || !res.ok) return;
        const comments = await res.json();
        const tbody = $("comments-table-body");
        tbody.innerHTML = comments
          .map(
            (c) => `
          <tr>
            <td>${c.id}</td>
            <td>${c.User?.username || "desconecido"}</td>
            <td>${c.content}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteComment(${c.id})">Eliminar</button></td>
          </tr>
        `,
          )
          .join("");
      }

      async function deleteUser(userId) {
        if (!confirm("Tens a certeza que queres eliminar este utilizador?"))
          return;
        const res = await apiFetch(`/admin/users/${userId}`, {
          method: "DELETE",
        });
        if (res && res.ok) {
          showToast("Utilizador eliminado com sucesso");
          loadUsers();
        } else {
          showToast("Erro ao eliminar utilizador", true);
        }
      }

      async function deleteTweet(tweetId) {
        if (!confirm("Tens a certeza que queres eliminar este tweet?")) return;
        const res = await apiFetch(`/admin/tweets/${tweetId}`, {
          method: "DELETE",
        });
        if (res && res.ok) {
          showToast("Tweet eliminado com sucesso");
          loadTweets();
        } else {
          showToast("Erro ao eliminar tweet", true);
        }
      }

      async function deleteComment(commentId) {
        if (!confirm("Tens a certeza que queres eliminar este comentário?"))
          return;
        const res = await apiFetch(`/admin/comments/${commentId}`, {
          method: "DELETE",
        });
        if (res && res.ok) {
          showToast("Comentário eliminado com sucesso");
          loadComments();
        } else {
          showToast("Erro ao eliminar comentário", true);
        }
      }

      loadAdminData();
    </script>
  </body>

</html>

      let allTweets = [];

      loadData();

      //  ── ESTATÍSTICAS ── 
      async function loadStats() {
        const [uRes, tRes] = await Promise.all([
          apiFetch("/admin/users"),
          apiFetch("/admin/tweets"),
        ]);
        if (uRes && uRes.ok) {
          const u = await uRes.json();
          allUsers = u;
          $("stat-users").textContent = u.length;
        }
        if (tRes && tRes.ok) {
          const t = await tRes.json();
          allTweets = t;
          $("stat-tweets").textContent = t.length;
        }
        // Comentários (opcional – se a rota existir)
        const cRes = await apiFetch("/admin/comments");
        if (cRes && cRes.ok) {
          const c = await cRes.json();
          $("stat-comments").textContent = c.length;
        } else {
          $("stat-comments").textContent = "–";
        }
      }

      //  ── TABS ── 
      function switchTab(tab) {
        currentTab = tab;
        $("tab-users").classList.toggle("active", tab === "users");
        $("tab-tweets").classList.toggle("active", tab === "tweets");
        $("table-search").value = "";
        renderTable(tab === "users" ? allUsers : allTweets);
      }

      //  ── CARREGAR DADOS ── 
      async function loadData() {
        $("admin-content").innerHTML = '<div class="spinner"></div>';
        await loadStats();
        renderTable(currentTab === "users" ? allUsers : allTweets);
      }

      //  ── FILTRO ── 
      function filterTable(q) {
        const data = currentTab === "users" ? allUsers : allTweets;
        const filtered = q.trim()
          ? data.filter((item) =>
              JSON.stringify(item).toLowerCase().includes(q.toLowerCase()),
            )
          : data;
        renderTable(filtered);
      }

      //  ── RENDER ── 
      function renderTable(data) {
        $("table-count").textContent =
          `${data.length} resultado${data.length !== 1 ? "s" : ""}`;
        if (currentTab === "users") renderUsers(data);
        else renderTweets(data);
      }

        $("edit-user-id").value = u.id;
        $("edit-user-username").value = u.username;
        $("edit-user-email").value = u.email;
        $("edit-user-role").value = u.role;
        $("edit-user-modal").classList.remove("hidden");

        const id = $("edit-user-id").value;
        const body = {
          username: $("edit-user-username").value.trim(),
          email: $("edit-user-email").value.trim(),
          role: $("edit-user-role").value,

          method: "PATCH",
          body: JSON.stringify(body),

        if (res && res.ok) {
          showToast("Utilizador atualizado!");
          $("edit-user-modal").classList.add("hidden");
          loadData();
        } else {
          showToast("Erro ao guardar.");
        }

      async function deleteUser(id) {
        if (!confirm("Eliminar este utilizador e todos os seus dados?")) return;
