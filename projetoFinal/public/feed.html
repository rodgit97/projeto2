<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xwitter – Início</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-layout">
      <nav class="sidebar" id="sidebar"></nav>

      <main class="feed-panel">
        <div>
          <div class="panel-header"><h1>Início</h1></div>
          <div class="feed-tabs">
            <button
              class="feed-tab active"
              id="tab-feed"
              onclick="switchTab('feed')"
            >
              Para si
            </button>
            <button class="feed-tab" id="tab-all" onclick="switchTab('all')">
              Global
            </button>
          </div>
        </div>

        <div id="tweets-list"><div class="spinner"></div></div>
      </main>

      <aside class="right-sidebar">
        <div style="margin-top: 12px">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              class="search-input"
              type="text"
              placeholder="Pesquisar..."
              oninput="onSideSearch(this.value)"
              id="side-search"
            />
          </div>
        </div>

        <div class="widget" id="suggest-widget">
          <div class="widget-header">Quem seguir</div>
          <div id="suggest-list">
            <div class="spinner" style="margin: 16px auto"></div>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
